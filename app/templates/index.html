<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }}</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 50px; background-color: #f4f6f9; color: #333; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; }
        h1 { color: #007bff; margin-top: 0; font-size: 28px; }
        p { font-size: 16px; line-height: 1.6; margin: 12px 0; }
        .status-badge { background-color: #d4edda; color: #155724; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .btn { display: inline-block; background-color: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; transition: background 0.2s; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ app_name }}</h1>
        <p><strong>Versión del Sistema:</strong> {{ version }}</p>
        <p><strong>Estado de Base de Datos:</strong> <span class="status-badge">{{ status }}</span></p>
        <a href="/productos" class="btn">📦 Ver Catálogo de Productos</a>
    </div>
</body>
</html>
